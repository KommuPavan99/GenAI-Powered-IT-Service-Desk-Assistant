{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">
                📝 Create New Incident
            </h3>

        </div>

        <div class="card-body p-4">

            <form method="POST">

                {% csrf_token %}

                {% if form.errors %}

                <div class="alert alert-danger">

                    <strong>Please correct the following errors:</strong>

                    {{ form.errors }}

                </div>

                {% endif %}

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Incident Title

                    </label>

                    {{ form.title }}

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Description

                    </label>

                    {{ form.description }}

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            Category

                        </label>

                        {{ form.category }}

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">

                            Priority

                        </label>

                        {{ form.priority }}

                    </div>

                </div>

                <div class="d-flex gap-2">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Submit Incident

                    </button>

                    <a
                        href="{% url 'incident_list' %}"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
